name: Deploy - SSH

on:
  workflow_call:
    inputs:
      deploy-path:
        description: "Deployment path on the server"
        required: true
        type: string
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SERVER_HOST:
        required: true
      SERVER_USER:
        required: true

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    env:
      SSH_AUTH_SOCK: /tmp/ssh_agent.sock

    steps:
      - name: Setup SSH agent
        run: |
          ssh-agent -a $SSH_AUTH_SOCK -s > /dev/null
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' | SSH_ASKPASS_REQUIRE=never ssh-add - > /dev/null

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_ACTOR,GITHUB_TOKEN
          script: |
            cd ${{ inputs.deploy-path }}
            export GITHUB_ACTOR="${{ github.actor }}"
            export GITHUB_TOKEN="${{ github.token }}"
            ./deploy.sh
